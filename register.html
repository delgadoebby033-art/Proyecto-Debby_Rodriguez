<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>

    <!-- ICONOS -->
    <script src="https://kit.fontawesome.com/2600c6ce36.js" crossorigin="anonymous"></script>

    <!-- ESTILOS -->
    <link rel="stylesheet" href="css/estilosRegister.css">

    <!-- hace llamado a la pagina de fuentes-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Akt:wght@100..900&family=Handlee&display=swap" rel="stylesheet">
</head>

<body class="form-body">

  <div class="form-container">

    <div class="icon-circle">
        <i class="fa fa-user-plus"></i>
    </div>

    <h2>Registro</h2>

    <section class="login">
        <form>

            <input type="text" placeholder="Nombre completo" required>

            <input type="email" placeholder="Correo electrónico" required>

            <input type="text" placeholder="Usuario" required>

            <input type="password" placeholder="Contraseña" required>

            <input type="password" placeholder="Confirmar contraseña" required>

            <button type="submit">Registrarme</button>

        </form>
    </section>

    <div class="links">
        <a href="login.html">¿Ya tienes cuenta? Inicia sesión</a>
    </div>

</div>
</body>
</html>
